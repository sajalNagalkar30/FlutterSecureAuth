name: Deploy Flutter Web → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/flutter_login_registration/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: app/flutter_login_registration
        run: flutter pub get

      - name: Enable web
        run: flutter config --enable-web

      - name: Build web (release)
        working-directory: app/flutter_login_registration
        run: |
          flutter build web --release \
            --dart-define=BASE_URL=${{ secrets.SERVER_URL }} \
            --base-href /FlutterSecureAuth/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/flutter_login_registration/build/web

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
