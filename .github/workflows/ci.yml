name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend — install, lint, test
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Recreate .env from GitHub Secrets
      - name: Create .env file
        run: |
          cat <<EOF > .env
          PORT=9000
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          USE_HTTPS=true
          CORS_ORIGIN=*
          EOF

      # Recreate SSL certs from GitHub Secrets
      - name: Restore SSL certificates
        run: |
          mkdir -p backend/certs
          echo "${{ secrets.SSL_CERT }}" > backend/certs/server.crt
          echo "${{ secrets.SSL_KEY }}"  > backend/certs/server.key

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run backend (smoke test — server starts without crashing)
        run: |
          timeout 10 node backend/server.js &
          sleep 5
          curl -k https://localhost:9000 || true
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Flutter CI — analyze + test (ubuntu, fast)
  # ─────────────────────────────────────────────────────────────────────────
  flutter-check:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: app/flutter_login_registration
        run: flutter pub get

      - name: Analyze code
        working-directory: app/flutter_login_registration
        run: flutter analyze

      - name: Run tests
        working-directory: app/flutter_login_registration
        run: flutter test

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Build Android APK
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: flutter-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: app/flutter_login_registration
        run: flutter pub get

      - name: Build APK
        working-directory: app/flutter_login_registration
        run: flutter build apk --release --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlutterSecureAuth-APK
          path: app/flutter_login_registration/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Build iOS IPA (requires macOS runner)
  # ─────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: flutter-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: app/flutter_login_registration
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: app/flutter_login_registration/ios
        run: pod install

      - name: Build IPA (no code sign)
        working-directory: app/flutter_login_registration
        run: flutter build ipa --release --no-pub --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FlutterSecureAuth-IPA
          path: app/flutter_login_registration/build/ios/ipa/*.ipa
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
