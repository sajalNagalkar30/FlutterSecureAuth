name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend — install, lint, test
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Recreate .env from GitHub Secrets
      - name: Create .env file
        run: |
          cat <<EOF > .env
          PORT=9000
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          USE_HTTPS=true
          CORS_ORIGIN=*
          EOF

      # Recreate SSL certs from GitHub Secrets
      - name: Restore SSL certificates
        run: |
          mkdir -p backend/certs
          echo "${{ secrets.SSL_CERT }}" > backend/certs/server.crt
          echo "${{ secrets.SSL_KEY }}"  > backend/certs/server.key

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run backend (smoke test — server starts without crashing)
        run: |
          timeout 10 node backend/server.js &
          sleep 5
          curl -k https://localhost:9000 || true
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Flutter — analyze and build
  # ─────────────────────────────────────────────────────────────────────────
  flutter:
    name: Flutter CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        working-directory: app/flutter_login_registration
        run: flutter pub get

      - name: Analyze Flutter code
        working-directory: app/flutter_login_registration
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: app/flutter_login_registration
        run: flutter test

      - name: Build Flutter APK (Android)
        working-directory: app/flutter_login_registration
        run: flutter build apk --release --no-pub

      # ── Upload APK so it can be downloaded from GitHub Actions ──────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterSecureAuth-APK
          path: app/flutter_login_registration/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30   # artifact stays available for 30 days

      # ── Build iOS IPA (macOS runner required) ────────────────────────────
      # Uncomment when you want iOS builds (uses paid minutes)
      # - name: Build iOS IPA
      #   working-directory: app/flutter_login_registration
      #   run: flutter build ipa --release --no-pub --no-codesign

      # - name: Upload IPA artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: FlutterSecureAuth-IPA
      #     path: app/flutter_login_registration/build/ios/ipa/*.ipa
      #     retention-days: 30

