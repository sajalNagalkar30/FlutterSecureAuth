name: flutter_secure_auth
description: "FlutterSecureAuth — BLoC Clean Architecture with JWT, Refresh Token & SSL Pinning"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Internet connectivity
  connectivity_plus: ^5.0.2

  # Dependency injection
  get_it: ^8.0.2

  # Root / Jailbreak detection
  flutter_jailbreak_detection: ^1.9.0

dependency_overrides:
  path_provider_android: 2.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
