<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>

    <!-- Primary purple gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6C63FF" flood-opacity="0.4"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#6C63FF" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#6C63FF" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#6C63FF" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#6C63FF" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#6C63FF" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#6C63FF" stroke-width="1"/>
  </g>

  <!-- Glow orb behind shield -->
  <circle cx="256" cy="248" r="130" fill="#6C63FF" opacity="0.12" filter="url(#glow)"/>

  <!-- Shield shape -->
  <path d="M256 108
           L356 148
           L356 248
           Q356 318 256 372
           Q156 318 156 248
           L156 148
           Z"
        fill="url(#shieldGrad)"
        filter="url(#shadow)"
        opacity="0.95"/>

  <!-- Shield inner highlight (top edge) -->
  <path d="M256 120
           L348 157
           L348 248
           Q348 312 256 362
           Q164 312 164 248
           L164 157
           Z"
        fill="none"
        stroke="rgba(255,255,255,0.18)"
        stroke-width="2"/>

  <!-- Lock body -->
  <rect x="218" y="255" width="76" height="62" rx="10" ry="10"
        fill="white" opacity="0.95"/>

  <!-- Lock shackle -->
  <path d="M233 255 L233 232 Q233 208 256 208 Q279 208 279 232 L279 255"
        fill="none"
        stroke="white"
        stroke-width="14"
        stroke-linecap="round"
        opacity="0.95"/>

  <!-- Lock keyhole -->
  <circle cx="256" cy="278" r="9" fill="#6C63FF"/>
  <rect x="252" y="278" width="8" height="14" rx="3" fill="#6C63FF"/>

  <!-- Flutter-style diagonal accent lines (top-right) -->
  <g opacity="0.25" transform="translate(342, 108) rotate(45)">
    <rect x="0" y="0" width="28" height="6" rx="3" fill="#a78bfa"/>
    <rect x="0" y="12" width="20" height="6" rx="3" fill="#a78bfa"/>
    <rect x="0" y="24" width="12" height="6" rx="3" fill="#a78bfa"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="160" cy="390" r="5" fill="#6C63FF" opacity="0.5"/>
  <circle cx="176" cy="400" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="352" cy="390" r="5" fill="#6C63FF" opacity="0.5"/>
  <circle cx="336" cy="400" r="3" fill="#a78bfa" opacity="0.4"/>

  <!-- App name label -->
  <text x="256" y="432"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="36"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="1"
        opacity="0.92">SecureAuth</text>

  <!-- Thin accent line under text -->
  <rect x="196" y="441" width="120" height="2.5" rx="1.25" fill="url(#primaryGrad)" opacity="0.7"/>
</svg>
